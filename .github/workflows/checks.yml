name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true
          run_install: |
            - recursive: true
              args: [--strict-peer-dependencies]
        timeout-minutes: 2
      - run: pnpm run ci
